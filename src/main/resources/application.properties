spring.application.name=pr
github.token=${GITHUB_TOKEN}
github.api.base.url=https://api.github.com
ollama.base-url=http://localhost:11434
ollama.model=llama3.2
github.webhook.secret=${GITHUB_WEBHOOK_SECRET:placeholder}
logging.level.io.netty.resolver.dns.macos=OFF

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/reviewbot
spring.datasource.username=reviewbot
spring.datasource.password=reviewbot123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Ollama
ollama.embedding-model=nomic-embed-text
