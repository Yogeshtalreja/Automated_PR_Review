services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: reviewbot-db
    environment:
      POSTGRES_DB: reviewbot
      POSTGRES_USER: reviewbot
      POSTGRES_PASSWORD: reviewbot123
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

volumes:
  pgvector_data: